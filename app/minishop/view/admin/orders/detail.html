<style>
.knowledge-order-info .cover {
    float: left;
    width: 80px;
    margin-right: 10px;
}
.knowledge-order-info .info {
    margin-left: 90px;
    font-size: 14px;
}
.knowledge-order-info .info .price {
    height: 18px;
    line-height: 18px;
    color: #EA644A;
}
</style>
<div class="knowledge-order-detail">
	<div class="avatar text-center">
		<div class="avatar-img">
			<img src="{$data.user_info.avatar64}" class="img-circle" />
		</div>
		<div class="nickname">
			{$data.user_info.nickname}
		</div>
	</div>
	
	<div class="knowledge-order">
		<p>订单号：{$data.order_no}</p>
		{eq name="data.paid" value='1'}
		<p>支付状态：<span class="label label-success">{$data.paid_str}</span></p>
		<p>支付时间：{$data.paid_time_str}</p>
		{else /}
		<p>支付状态：<span class="label">{$data.paid_str}</span></p>
		{/eq}
		<p>创建时间：{$data.create_time_str}</p>
		
	</div>

	<div class="knowledge-order-info clearfix">
		
        <div class="cover">
            <img src="{$data.order_info.cover|getThumbImageById=80,60}">
        </div>
        <div class="info">
            <div class="title text-ellipsis">[{$data.type_str}]{$data.order_info.title}</div>
            <div class="price">￥{$data.paid_fee}</div>
        </div>
        
	</div>
</div>
