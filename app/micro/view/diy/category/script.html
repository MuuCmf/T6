<!--分类&筛选 START-->
<script type="text/html" data-object-type="category">
	<div class="object-item" data-type="category">
		<div class="object-drag category">
			<div class="category-preview">
				<!--一级分类&筛选按钮-->
				<div class="category-box">
					<div class="main-box clearfix">
						<div class="recommend-btn title active swiper-slide">
							推荐
							<hr />
						</div>
		
						<div class="category-list swiper-category-container">
							<div class="swiper-wrapper">
								
							</div>
						</div>
					</div>
					<div class="sub-box">
						
					</div>
				</div>
			</div>
			<div class="del-btn"><i class="fa fa-times-circle fa-2x"></i></div>
			<div class="up-btn"><i class="fa fa-chevron-circle-up fa-2x"></i></div>
			<div class="down-btn"><i class="fa fa-chevron-circle-down fa-2x"></i></div>
		</div>
        
		<div class="diy-preview-controller category">
			<div class="panel panel-info">
			 	<div class="panel-heading">
			    	分类&筛选
			 	</div>
			 	<div class="panel-body">
					<input type="hidden" name="app" value="micro"/>
			 		<input type="hidden" name="title" value="分类&筛选"/>
					<input type="hidden" name="type" value="category"/>
			 		<div class="form-horizontal category-item" data-rule="object-controller-item">
						<div class="form-group">
						    <label class="col-sm-3 control-label">选择应用</label>
						    <div class="col-sm-9">
							    <select class="form-control" name="app">
									{foreach $app_list as $v}
									<option value="{$v.name}">{$v.alias}</option>
									{/foreach}
								</select>
						    </div>
					  	</div>
			    		<div class="form-group">
						    <label class="col-sm-3 control-label">显示子分类</label>
						    <div class="col-sm-9">
							    <select class="form-control" name="sub_show">
									<option value="0">不显示</option>
									<option value="1" selected>显示</option>
								</select>
						    </div>
					  	</div>
					  	<div class="form-group">
						    <label class="col-sm-3 control-label"></label>
						    <div class="col-sm-9">
								<button type="button" class="btn btn-primary btn-submit" data-role="submit">确认</button>
						    </div>
					  	</div>
			    	</div>
			 	</div>
			</div>
		</div>
    </div>
    

</script>
<!--分类&筛选 END-->
