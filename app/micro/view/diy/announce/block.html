
<div class="object-item" data-type="announce" data-object-index="announce-{$vars['key']}">
	<div class="object-drag announce">
		<div class="announce-preview preview">
			<div class="announce-lists-box">
				<div class="announce-left">公告</div>
				<ul class="announce-list">
					{notempty name="$vars['data']['data']['list']"}
					{foreach $vars['data']['data']['list'] as $v}
			        <li class="text-ellipsis" data-type="{$v['type']}" data-id="{$v['id']}">{$v['title']}</li>
			        {/foreach}
					{/notempty}
			    </ul>
			</div>
		</div>
		<div class="del-btn"><i class="fa fa-times-circle fa-2x"></i></div>
		<div class="up-btn"><i class="fa fa-chevron-circle-up fa-2x"></i></div>
		<div class="down-btn"><i class="fa fa-chevron-circle-down fa-2x"></i></div>
	</div>
	<div class="diy-preview-controller announce">
		<div class="panel panel-info">
		 	<div class="panel-heading">
		    	公告
		 	</div>
		 	<div class="panel-body">
				<form class="form-horizontal" data-type="announce">
					<input type="hidden" name="app" value="micro"/>
					<input type="hidden" name="title" value="公告"/>
					<input type="hidden" name="type" value="announce"/>
					<div class="announce-item" data-rule="object-controller-item">
						<div class="form-group">
							<label class="col-sm-3 control-label">显示条数</label>
							<div class="col-sm-9">
								<select class="form-control" name="rows" data-rows="{$vars['data']['data']['rows']|default=1}">
									{if $vars['data']['data']['rows'] == 1}
									<option value="1" selected>1</option>
									{else}
									<option value="1">1</option>
									{/if}

									{if $vars['data']['data']['rows'] == 2}
									<option value="2" selected>2</option>
									{else}
									<option value="2">2</option>
									{/if}

									{if $vars['data']['data']['rows'] == 3}
									<option value="3" selected>3</option>
									{else}
									<option value="3">3</option>
									{/if}
								</select>
							</div>
						</div>
						<div class="form-group">
							<label class="col-sm-3 control-label"></label>
							<div class="col-sm-9">
							<button type="button" class="btn btn-primary">确认</button>
							</div>
						</div>
					</div>
				</form>
		 	</div>
		</div>
	</div>
</div>
