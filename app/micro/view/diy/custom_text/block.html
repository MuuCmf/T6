
<!--自定义文本组件-->
<div class="object-item" data-type="custom_text" data-object-index="custom_text-{$key}">
	<div class="object-drag custom-text">
		<div class="custom-text-preview">
            <div class="content">
                {:htmlspecialchars_decode($vo['data']['content'])}
            </div>
		</div>
	</div>
	<div class="diy-preview-controller custom-text">
		<div class="panel panel-info">
		 	<div class="panel-heading">
		    自定义文本
		 	</div>
		 	<div class="panel-body">
				<input type="hidden" name="app" value="micro"/>
				<input type="hidden" name="title" value="自定义文本"/>
				<input type="hidden" name="type" value="custom_text"/>
		 		<textarea class="hidden" name="content">{:htmlspecialchars_decode($vo['data']['content'])}</textarea>
		 		<button type="button" class="btn btn-block btn-primary" data-toggle="modal" data-target="#customTextEditorModal">富文本编辑器</button>

			</div>
		</div>
	</div>
	<div class="del-btn"><i class="fa fa-times-circle fa-2x"></i></div>
	<div class="up-btn"><i class="fa fa-chevron-circle-up fa-2x"></i></div>
	<div class="down-btn"><i class="fa fa-chevron-circle-down fa-2x"></i></div>
</div>
<!--自定义文本组件END-->
