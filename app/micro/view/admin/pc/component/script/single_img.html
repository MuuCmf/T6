<!--单图广告START-->
<script type="text/html" data-object-type="single_img">
	<div class="object-item" data-type="single_img">
		<div class="object-drag single-img">
			<div class="single-img-preview preview">
				<span>单图片广告组件</span>
				<br />
			    <span>（建议宽度不低于900px的jpg、png、gif）</span>
			</div>
			<div class="del-btn"><i class="fa fa-times-circle fa-2x"></i></div>
			<div class="up-btn"><i class="fa fa-chevron-circle-up fa-2x"></i></div>
			<div class="down-btn"><i class="fa fa-chevron-circle-down fa-2x"></i></div>
		</div>

		<div class="diy-preview-controller single-img">
			<div class="panel panel-info">
			 	<div class="panel-heading">
			    	单图片广告
			 	</div>
			 	<div class="panel-body">
			 		<input type="hidden" name="title" value="单图广告"/>
			 		<input type="hidden" name="type" value="single-img"/>
			 		<div class="form-horizontal single-img-item" data-rule="object-controller-item">
			    		<div class="form-group add">
			    			<div class="col-sm-12">
					 			<input type="hidden" name="img_id" />
					 			<input type="hidden" name="img_url" />
					 			<div class="uploadImgBtn btn btn-primary">上传图片</div>
					 		</div>
				    	</div>
				    	<div class="form-group">
							<div class="clearfix" data-rule="links_list">
								<label for="" class="col-xs-3">
									<div class="dropdown">
									  	<button class="btn" type="button" data-toggle="modal" data-target="#linkTypeModal">
									  		选择链接
									  	</button>
									</div>
								</label>
								<div class="col-xs-9">
									<div class="link_title">
										<ol class="breadcrumb">
										  <li></li>
										  <li class="active"></li>
										</ol>
									</div>
								</div>
								<!--链接至隐藏域START-->
								<input type="hidden" name="link_sys_type" >
								<input type="hidden" name="link_title" >
								<input type="hidden" name="link_type" >
								<input type="hidden" name="link_type_title" >
								<input type="hidden" name="link_url" >
								<textarea type="hidden" name="link_param" class="hidden"></textarea>
								<!--链接至隐藏域END-->
							</div>
						</div>
						<div class="col-sm-12" style="margin-top: 10px;">
							<div class="form-group">
								<label class="">样式选择</label>
								<select class="form-control wide" name="style">
									<option value="0" selected>通栏</option>
									<option value="1">窄幅</option>
								</select>
							</div>
		
							<div class="form-group">
								<button class="btn btn-primary">预览</button>
							</div>
						</div>
			    	</div>
			 	</div>
			</div>
		</div>
	</div>
</script>
<!--单图广告END-->
