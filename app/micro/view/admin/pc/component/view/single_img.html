{if $vo['type'] == 'single_img'}
<section class="object-item preview single-img" data-type="single_img" data-object-index="single_img-{$key}">
	<div class="single-img-preview preview">
		{if !empty($vo['data'])}
		{foreach $vo['data'] as $k => $v}
		{if isset($v['img_url']) && !empty($v['img_url'])}
			<img src="{$v['img_url']}" />
		{else}
			图片未上传
		{/if}
		{/foreach}
		{/if}
	</div>
</section>
{/if}
