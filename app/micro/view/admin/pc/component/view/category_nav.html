{if $vo['type'] == 'category_nav'}
<!--图文导航组件-->
<div class="object-item preview category-nav" data-type="category_nav" data-object-index="category_nav-{$key}">
	<div class="category-nav-preview">
		<div class="title clearfix {if $vo['data_title_show'] == 0}hidden{/if}">
			<h2>{$vo['data_title']}</h2>
			<span class="sub-title">{$vo['data_sub_title']}</span>
		</div>
		<div class="nav-class-one">
			{foreach $vo['data'] as $k => $v}
			<div class="category-nav-item enable" style="
				{if $vo['colume'] == 3}width: 33%;{/if}
				{if $vo['colume'] == 4}width: 25%;{/if}
				{if $vo['colume'] == 5}width: 20%;{/if}">
				{if !empty($v['icon_url'])}
				<img src="{$v['icon_url']}" class="item-image">
				{else}
				<img src="/images/diy/noimg.png" class="item-image"> 
				{/if}
				<div class="item-text {if $vo['colume_title_show'] == 0}hidden{/if}">{$v['nav_title']}</div>
			</div>
			{/foreach}
		</div>
	</div>
</div>
{/if}
