{if $vo['type'] == 'announce'}
<div class="object-item" data-type="announce" data-object-index="announce-{$key}">
	<div class="object-drag announce">
		<div class="announce-preview preview">
			<div class="announce-lists-box">
				<div class="announce-left">公告</div>
				<ul class="announce-list">
					{notempty name="$vo['data']['list']"}
					{foreach $vo['data']['list'] as $k => $vo_data}
			        <li data-type="{$vo_data['type']}" data-id="{$vo_data['id']}">{$vo_data['title']}</li>
			        {/foreach}
					{/notempty}
			    </ul>
			</div>
		</div>
		<div class="del-btn"><i class="fa fa-times-circle fa-2x"></i></div>
		<div class="up-btn"><i class="fa fa-chevron-circle-up fa-2x"></i></div>
		<div class="down-btn"><i class="fa fa-chevron-circle-down fa-2x"></i></div>
	</div>
	<div class="diy-preview-controller announce">
		<div class="panel panel-info">
		 	<div class="panel-heading">
		    	公告
		 	</div>
		 	<div class="panel-body">
		 		<input type="hidden" name="title" value="公告"/>
				<input type="hidden" name="type" value="announce_block"/>
		 		<div class="form-horizontal announce-item" data-rule="object-controller-item">
		    		<div class="form-group">
					    <label class="col-sm-3 control-label">显示条数</label>
					    <div class="col-sm-9">
						    <select class="form-control" name="rows" data-rows="{$vo['data']['rows']}">
						    	{if $vo['data']['rows'] == 1}
						    	<option value="1" selected>1</option>
						    	{else}
						    	<option value="1">1</option>
						    	{/if}

						    	{if $vo['data']['rows'] == 2}
						    	<option value="2" selected>2</option>
						    	{else}
						    	<option value="2">2</option>
						    	{/if}

						    	{if $vo['data']['rows'] == 3}
						    	<option value="3" selected>3</option>
						    	{else}
						    	<option value="3">3</option>
						    	{/if}
							</select>
					    </div>
				  	</div>
				  	<div class="form-group">
					    <label class="col-sm-3 control-label"></label>
					    <div class="col-sm-9">
					      <button class="btn btn-primary">确认</button>
					    </div>
				  	</div>
		    	</div>
		 	</div>
		</div>
	</div>
</div>
{/if}
