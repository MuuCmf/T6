
<!-- 店铺风格设置模态框 start -->
<div class="modal fade muu-modal style-Modal" id="style-Modal">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">×</span></button>
				<h3 class="modal-title">店铺风格设置</h3>
			</div>
			<form action="" method="post" class="form form-horizontal ajax-form" role="form">
			<div class="modal-body">
				<div class="form-group">
					<section class="shop-style-section">
						<div class="shop-style-list">
                            {volist name="style" id="vo"}
							<div class="style {$vo['title']} {if $data['style']==$vo['title']} active{/if}" data-id="{$vo['id']}" data-title="{$vo['title']}" >
								{$vo['title']}
								<div class="choose"><i class="fa fa-check"></i></div>	
							</div>
							{/volist}
						</div>
					</section>
				</div>
			</div>
			<div class="modal-footer">
				<input type="hidden" name="style" value="{$data['style']}" />
				<button type="submit" class="btn btn-primary">确定</button> 
				<button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
			</div>
			</form>
		</div>
	</div>
	<script>
	$(function(){
		//更新店铺风格
		$('.shop-style-list .style').click(function(e){
			$('.shop-style-list .style').removeClass('active');
			$(this).addClass('active');
			$('#style-Modal input[name="style"]').val($(this).data('title'));
		});
	});
	</script>
</div>
<!-- 店铺风格设置模态框 end -->

<!-- 搜索推荐关键字设置模态框 start -->
<div class="modal fade muu-modal" id="search-keywords-config-Modal">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">×</span></button>
				<h3 class="modal-title">搜索推荐关键字设置</h3>
			</div>
			<form action="" method="post" class="form form-horizontal ajax-form" role="form">
			<div class="modal-body form">
				<div class="form-group clearfix">
					<label class="col-xs-12 col-sm-3 col-md-2 control-label">搜索推荐关键字</label>
					<div class="col-sm-9 col-xs-12">
						<textarea name="search" rows="5" class="form-control">{$data['search']}</textarea>
						<div class="help-block">搜索推荐关键字，每行一条</div>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button type="submit" class="btn btn-primary">确定</button> 
				<button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
			</div>
			</form>
		</div>
	</div>
</div>
<!-- 搜索推荐关键字设置模态框 END -->
