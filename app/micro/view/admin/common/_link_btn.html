<div class="clearfix" data-rule="links_list">
	<label for="" class="col-xs-3">
		<div class="dropdown">
		  	<button class="btn" type="button" data-toggle="modal" data-target="#linkTypeModal">
		  		选择链接
		  	</button>
		</div>
	</label>

	<div class="col-xs-9">
		<div class="link_title">
			<ol class="breadcrumb">
			  <li>{if !empty($vars['data']['data']['link']['type_title'])}{$vars['data']['data']['link']['type_title']}{/if}</li>
			  <li class="active">{if !empty($vars['data']['data']['link']['title'])}{$vars['data']['data']['link']['title']}{/if}</li>
			</ol>
		</div>
	</div>
	<!--链接至隐藏域START-->
	<input type="hidden" name="link_sys_type" value="{$vars['data']['data']['link']['sys']|default=''}">
	<input type="hidden" name="link_title" value="{$vars['data']['data']['link']['title']|default=''}">
	<input type="hidden" name="link_type" value="{$vars['data']['data']['link']['type']|default=''}">
	<input type="hidden" name="link_type_title" value="{$vars['data']['data']['link']['type_title']|default=''}">
	<textarea type="hidden" name="link_param" class="hidden">{$vars['data']['data']['link']['param']|default=''}</textarea>
	<!--链接至隐藏域END-->
</div>
