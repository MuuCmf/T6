<div class="login-main">
    <div class="header">
        <h2><span>[</span> 用户登录 <span>]</span></h2>
    </div>
    <div class="clearfix"></div>
    <form action="{:url('ucenter/Common/login')}" method="post" class="ajax_form">
        <div class="row">
            <div class="form-group">
                <label for="loginMainAccount" class=".sr-only col-xs-12"></label>
                <div class="col-xs-12">
                    <input type="text" id="loginMainAccount" class="form-control input-lg new-input" placeholder="{$ph}" name="account">
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="form-group clearfix">
                <label for="inputPassword" class=".sr-only col-xs-12"></label>
                <div class="col-xs-12">
                    <div id="password_block" class="input-group">
                        <input type="password" id="inputPassword" class="form-control input-lg new-input" placeholder="请输入密码" name="password">
                        <div class="input-group-addon"><a class="change_show" href="javascript:void(0);">show</a></div>
                    </div>
                </div>
            </div>
            {if check_verify_open('login')}
                <div class="form-group clearfix">
                    <label for="verifyCode" class=".sr-only col-xs-12" style="display: none"></label>

                    <div class="col-xs-8">
                        <input type="text" id="verifyCode" class="form-control input-lg new-input" placeholder="验证码" datatype="*5-5" name="captcha">
                    </div>
                    <div class="col-xs-4">
                        <img class="verifyimg reloadverify" alt="刷新验证码" src="{:captcha_src()}" style="cursor:pointer;height:43px;max-width: 100%">
                    </div>
                </div>
            {/if}
            <div class="clearfix form-group">
                <div class="col-xs-6">
                    
                </div>
                <div class="col-xs-6 text-right">
                    <div class="with-padding">
                        <a class="" href="{:url('ucenter/Common/mi')}" style="color: #848484;font-size: 12px;">忘记密码</a>
                    </div>
                </div>
            </div>
        </div>
        {php}
            if(!empty($_SERVER['HTTP_REFERER'])){
                $referer = $_SERVER['HTTP_REFERER'];
            }else{
                $referer = url('index/index/index');
            }
            session('login_http_referer',$referer);
        {/php}
        <input name="from" type="hidden" value="{$referer}">
        <div class="form-group">
            <button type="submit" class="btn btn-block btn-login btn-lg"> 登 录 </button>
        </div>
    </form>  

    <div class="register-section">
        还没有账号  <a href="{:url('ucenter/common/register',array('type'=>'mobile'))}" class="">立即注册</a>
    </div>
</div>
<div class="clearfix"></div>

<script type="text/javascript">

    $(function(){
        
        $(document)
            .ajaxStart(function () {
                $("button:submit").addClass("log-in").attr("disabled", true);
            })
            .ajaxStop(function () {
                $("button:submit").removeClass("log-in").attr("disabled", false);
            });

        $('.login-main').on("click",'.change_show',function(){
            change_show($(this));
        });

        function change_show(obj) {
            if ($(obj).text().trim() == 'show') {
                var value = $('#inputPassword').val().trim();
                var html = '<input type="text" value="' + value + '" id="inputPassword" class="form-control input-lg new-input" placeholder="'+"请输入密码"+'" name="password">' +
                        '<div class="input-group-addon"><a class="change_show" href="javascript:void(0);">hide</a></div>';
                $('#password_block').html(html);
            } else {
                var value = $('#inputPassword').val().trim();
                var html = '<input type="password" value="' + value + '" id="inputPassword" class="form-control input-lg new-input" placeholder="'+"请输入密码"+'" name="password">' +
                        '<div class="input-group-addon"><a class="change_show" href="javascript:void(0);">show</a></div>';
                $('#password_block').html(html);
            }
        }
    });
    

    $(function () {
        $("form").submit(function (e) {
            e.preventDefault();
            toast.showLoading();
            var self = $(this);
            $.post(self.attr("action"), self.serialize(), success, "json");
            return false;

            function success(data) {
                if (data.code) {
                    toast.success(data.msg);
                    if (data.url == undefined && quickLogin == "quickLogin") {
                        $('[data-role="login_info"]').append(data.msg);
                        setTimeout(function () {
                            window.location.reload();
                        }, 1500);
                    } else {
                        if (data.url == "refresh") {
                            setTimeout(function () {
                                location.href = location.href;
                            }, 1500);
                        } else {
                            setTimeout(function () {
                                location.href = data.url;
                            }, 1500);
                        }
                    }
                } else {
                    toast.error(data.msg);
                    //self.find(".Validform_checktip").text(data.msg);
                    //刷新验证码
                    $(".reloadverify").click();
                }
                toast.hideLoading();
            }
        });

        var verifyimg = $(".verifyimg").attr("src");
        $(".reloadverify").click(function () {
            if (verifyimg.indexOf('?') > 0) {
                $(".verifyimg").attr("src", verifyimg + '&random=' + Math.random());
            } else {
                $(".verifyimg").attr("src", verifyimg.replace(/\?.*$/, '') + '?' + Math.random());
            }
        });
    });
</script>
