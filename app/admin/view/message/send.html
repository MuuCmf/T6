

<div>
    <style>
        .modal-dialog {
            width: 600px;
        }
        .select_box_this {
            margin: 10px 0 20px;
            width: 100%;
            text-align: right;
            font-size: 16px;
        }
        .select_box_this .form-group {
            margin-top: 5px;;
        }
    </style>
    <form id="migration" action="{:url()}" method="post" class="form-horizontal ajax-form">

        <div class="form-group">
            <label class="col-sm-2 control-label">类型</label>
			<div class="form-controls col-sm-8">
                <input type="checkbox" id="systemMessage" value="systemMessage" name="sendType[]" checked>
                <label for="systemMessage">站内消息</label>

                <input type="checkbox" id="systemEmail" value="systemEmail" name="sendType[]">
                <label for="systemEmail">邮件</label>

                <input type="checkbox" id="systemEmail" value="systemEmail" name="sendType[]">
                <label for="systemEmail">短信</label>

                <input type="checkbox" id="systemEmail" value="systemEmail" name="sendType[]">
                <label for="systemEmail">模板消息</label>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">用户</label>
            <div class="form-controls col-sm-8">
                <div class="margin-bottom">
                    <button type="button" class="btn btn-sm btn-primary" role="button" data-name="chooseUserModal" data-iframe="{:url('admin/member/chooseUser')}" data-toggle="modal" data-scroll-inside="true" data-height="600px">选择用户</button>
                </div>
                <div class="choose-user clearfix" id="choose-user-cb">
                    <input type="hidden" name="manager_uid" id="choose-user-uid" value="{$data['manager_info']['uid']|default='0'}">
                    <img src="{$data['manager_info']['avatar64']|default=''}" alt="" id="choose-user-avatar">
                    <span id="choose-user-nickname">{$data['manager_info']['nickname']|default=''}</span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">内容</label>
            <div class="form-controls col-sm-8">
                <div class="margin-bottom">
                    <button type="button" class="btn btn-sm btn-primary" role="button" data-name="chooseMessageContentModal" data-iframe="{:url('admin/message/content',['mode'=>'list'])}" data-toggle="modal" data-scroll-inside="true" data-height="600px">选择消息内容</button>
                </div>
                <div class="message-content clearfix" id="messageContent">
                    
                </div>
                
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label"></label>
            <div class="form-controls col-sm-8">
                <button type="button" class="btn btn-success" data-role="submit">发送消息</button>
                <button type="button" onclick="$('.close').click();" class="btn btn-default">取消</button>
            </div>
        </div>
    </form>
</div>
<script>
    $(function () {
        $('[data-role="submit"]').click(function () {
            var query = $('#migration').serialize();
            var url = $('#migration').attr('action');
            $.post(url, query, function (msg) {
                if (msg.status) {
                    toast.success({:lang('_MESSAGE_SENDING_SUCCESS_WITH_SINGLE_')});
                    setTimeout(function () {
                        location.reload()
                       // window.location.href = msg.url;
                    }, 1500);
                } else {
                    handleAjax(msg);
                }
            }, 'json');
        });
    });
</script>
