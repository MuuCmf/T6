<form action="{:url('action', ['id' => $data['id']])}" method="post" class="form-horizontal form ajax-form" role="form">
    <div class="withdraw-action">
        <div class="form-group">
            <label class="col-xs-12 col-sm-3 col-md-2 control-label">用户</label>
            <div class="col-sm-9 col-xs-12">
                {if !empty($data.uid) && !empty($data.user_info) && is_array($data.user_info)}
                <a class="user-info" href="{:url('admin/Member/detail',['uid'=>$data['uid']])}">
                    <div class="cover">
                        <img src="{$data['user_info']['avatar64']}" alt="{$data['user_info']['nickname']}">
                    </div>
                    <div class="info">
                        <div class="title text-ellipsis">{$data['user_info']['nickname']}</div>
                    </div>
                </a>
                {else}
                <div class="no-user">
                    用户不存在
                </div>
                {/if}
            </div>
        </div>
        <div class="form-group">
            <label class="col-xs-12 col-sm-3 col-md-2 control-label">UID</label>
            <div class="col-sm-9 col-xs-12">
                <div style="padding-top: 7px">{$data['uid']}</div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-xs-12 col-sm-3 col-md-2 control-label">提现金额</label>
            <div class="col-sm-9 col-xs-12">
                <div style="padding-top: 7px;color:red">￥ {$data['price']}</div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2"><span style="color: red;">温馨提示</span></label>
            <div class="col-sm-10">
                在无法完成自动提现功能时，您可以手动将提现金额转账至用户，转账完成后点击确认已处理按钮完成手动提现流程！
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <input type="hidden" name="id" value="{$data['id']}" />
        <button type="submit" class="btn btn-primary">确定已处理</button>
    </div>
    </form>
