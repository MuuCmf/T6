{extend name="common/main"/}
{block name="style"}
<script src="__STATIC__/common/lib/vue/vue-2.6.14.js"></script>
<!-- 引入样式 -->
<link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
<!-- 引入组件库 -->
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
{/block}
{block name="body"}
<div class="update-warp " v-cloak>
    <div class="main-title">
        <h2>在线更新</h2>
    </div>
    <div class="with-padding main">
        <div class="upgrade-icon">
            <img alt="" src="__STATIC__/common/images/update.gif">
        </div>
        <!-- 进度条 -->
        <div :class="{'active':status == 0}" class="progress progress-striped">
            <div :style="{width:`${progressVal}%`}" aria-valuemax="100" class="progress-bar" role="progressbar"></div>
        </div>
        <!--进度描述-->
        <div class="progress-info">
            <div class="progress-title">{{progressTitle}}</div>
            <div :class="{'task-error':status == -1}" class="task">{{task}}</div>
            <div class="progress-num">{{progressVal}}%</div>
        </div>

        <div class="error-panel panel" v-if="errPackage.length > 0">
            <div class="panel-heading">
                <h4>错误信息</h4>
            </div>
            <div class="panel-body">
                <table class="table table-borderless">
                    <thead>
                    <tr>
                        <th>文件名</th>
                        <th>错误信息</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr v-for="(item,index) in errPackage">
                        <td :title="item.data.name" class="error-file" data-placement="top" data-toggle="tooltip">
                            {{item.data.name}}
                        </td>
                        <td class="error-msg">{{item.msg}}</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="btn-menu">
            <button @click="jump()" class="btn btn-default" v-if="status == -1">返回</button>
            <button @click="jump()" class="btn btn-primary" v-if="status == 1">确定</button>
        </div>
    </div>
</div>
<!-- 备份对话框 -->
<div class="modal fade" id="backupModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span aria-hidden="true">×</span><span class="sr-only">关闭</span></button>
                <h4 class="modal-title">升级前备份</h4>
            </div>
            <div class="modal-body">
                <p>备份路径 ：{$backupPath}</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default cancel-backup">开始更新</button>
                <button type="button" class="btn btn-primary backup" >备份</button>
            </div>
        </div>
    </div>
</div>
{/block}
{block name="script"}
<script>
    var vm = new Vue({
        el: '.update-warp',
        data: {
            progressVal: 0,//进度值
            status: 0,//更新状态 -1异常 0 进行中 1 已完成
            progressTitle: '获取信息中',//进度标题
            task: '',//进行任务
            appid: '854D7E66EA60F03720B5E9A3093AEF4D',
            appName: '{$appName}',//应用类型 0系统 1应用
            api: '{$Think.config.muucmf.cloud_api}',//接口api
            localVersion: '{$version}',//本地版本
            upgradeVersion: '{$upgradeVersion}',//要升级的版本
            package: null,//更新包
            packageProgress: 0,//更新包进度
            packageTotal: 0,//更新包总大小
            errPackage: [],//发生更新错误包
            retrying: true,//重试
            versionPackage: null,//版本号升级文件
            skipUpgradeVersion:false,//跳过更新版本号
        },
        created() {
            this.getUpgradeInfo();
        },
        methods: {
            /**
             * @title 获取应用升级信息
             */
            getUpgradeInfo() {
                let that = this;
                let api = that.api + "upgrade/"
                if (that.appName == 'system') {
                    api += "system/version";
                } else {
                    api += "app/version";
                }
                $.get(api, {
                    appid: that.appid,
                    version: that.upgradeVersion,
                }, function (res) {
                    console.log(res);
                    if (res.code == 200) {
                        that.package = res.data.data;
                        that.packageTotal = res.data.total;
                        that.versionPackage = res.data.version;
                        if (that.upgradeVersion != that.localVersion){
                            $('#backupModal').modal('show', 'center')
                        }else{
                            that.sameVersion();
                        }
                    } else {
                        that.status = -1;
                        that.progressTitle = '请求成功';
                        that.task = '没有获取到相应的版本信息'
                    }
                })
            },
            async upgrade() {
                let that = this;
                let step = that.packageTotal / 100;//计算百分比 步进值
                let item = that.package[that.packageProgress];//当前升级包
                that.progressVal = Math.floor(that.packageProgress / step);//进度条
                that.task = '下载中 ' + item.name;//任务名称
                $.post("{:url('upgrade')}", {
                    appid: that.appid,
                    app_name: that.appName,
                    version: that.upgradeVersion,
                    file: item.name,
                    md5: item.md5
                }, function (res) {
                    if (res.data == 'same_version'){
                        that.sameVersion();
                    }else{
                        if (res.code != 200) {
                            //记录当前错误信息
                            let err = {
                                msg: res.msg,
                                data: item
                            };
                            that.errPackage.push(err);
                        }
                        //继续执行
                        that.packageProgress++;
                        if (that.packageProgress >= that.packageTotal) {
                            //执行收尾工作
                            that.finishUpgrade();
                        } else {
                            //执行下一个
                            that.upgrade();
                        }
                    }

                })
            },
            /**
             * 无需升级
             */
            sameVersion(){
                let that = this;
                that.status = 1;
                that.progressTitle = '已经是最新版本了';
                that.progressVal = 100;
            },
            /**
             * 问题包重试
             */
            errRetry(i = 0) {
                let that = this;
                that.progressTitle = '重试中';
                let len = that.errPackage.length;
                if (i == len){
                    that.retrying = false;
                    that.finishUpgrade();
                    return false;
                }
                let item = that.errPackage[i]['data'];
                $.post("{:url('upgrade')}", {
                        appid: that.appid,
                        app_name: that.appName,
                        version: that.upgradeVersion,
                        file: item.name,
                        md5: item.md5
                    }, function (res) {
                        if (res.code == 0){
                            that.skipUpgradeVersion = true;
                        }
                        that.errRetry(i + 1);
                    }
                )
            },
            /**
             * 执行收尾任务
             */
            finishUpgrade() {
                let that = this;
                if (that.retrying) {
                    that.errRetry();
                }
                $.post("{:url('finish')}", {
                    appid: that.appid,
                    app_name: that.appName,
                    version: that.upgradeVersion,
                    file: that.versionPackage.name,
                    md5: that.versionPackage.md5,
                    skip: that.skipUpgradeVersion ? 1 : 0,
                }, function (res) {
                    that.status = 1;
                    that.progressTitle = '升级完成';
                    that.progressVal = 100;
                })
            },
            /**
             * 备份
             */
            backup(){
                let that = this;
                $('#backupModal').modal('hide');
                that.progressTitle = '备份中';
                $.post("{:url('backup')}", {
                    app_name: that.appName,
                }, function (res) {
                    if (res.code == 200){
                        toast.success('备份成功');
                        that.progressTitle = '开始升级';
                        // that.upgrade();
                    }else{
                        toast.error(res.msg);
                        setTimeout(function () {
                            $('#backupModal').modal('show', 'center');
                        },500)
                    }
                })
            },
            /**
             *
             */
            cancelBackup(){
                console.log(123213);
                $('#backupModal').modal('hide');
                this.progressTitle = '开始升级';
                this.upgrade();
            },
            jump() {
                window.history.go(-1);
            }
        }
    })
    $('#backupModal').on('click','.backup',function () {
        vm.backup();
    })
    $('#backupModal').on('click','.cancel-backup',function () {
        vm.cancelBackup();
    })
</script>
{/block}
