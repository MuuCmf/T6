version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
    container_name: muucmf-app
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html/app
      - ./config:/var/www/html/config
      - ./public:/var/www/html/public
      - ./route:/var/www/html/route
      - ./extend:/var/www/html/extend
      - ./data/runtime:/var/www/html/runtime
      - ./data/uploads:/var/www/html/public/uploads
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-muucmf}
      - DB_USERNAME=${DB_USERNAME:-muucmf}
      - DB_PASSWORD=${DB_PASSWORD:-muucmf_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - muucmf-network
    depends_on:
      - mysql
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
    container_name: muucmf-worker
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html/app
      - ./config:/var/www/html/config
      - ./public:/var/www/html/public
      - ./route:/var/www/html/route
      - ./extend:/var/www/html/extend
      - ./data/runtime:/var/www/html/runtime
      - ./data/uploads:/var/www/html/public/uploads
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-muucmf}
      - DB_USERNAME=${DB_USERNAME:-muucmf}
      - DB_PASSWORD=${DB_PASSWORD:-muucmf_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - muucmf-network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: muucmf-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./public:/var/www/html/public
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./data/logs/nginx:/var/log/nginx
    networks:
      - muucmf-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: muucmf-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./data/backup:/backup
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${DB_DATABASE:-muucmf}
      - MYSQL_USER=${DB_USERNAME:-muucmf}
      - MYSQL_PASSWORD=${DB_PASSWORD:-muucmf_password}
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - muucmf-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: muucmf-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - muucmf-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: muucmf-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=${DB_USERNAME:-muucmf}
      - PMA_PASSWORD=${DB_PASSWORD:-muucmf_password}
      - UPLOAD_LIMIT=100M
    networks:
      - muucmf-network
    depends_on:
      - mysql
    profiles:
      - tools

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: muucmf-redis-commander
    restart: unless-stopped
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - muucmf-network
    depends_on:
      - redis
    profiles:
      - tools

networks:
  muucmf-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
